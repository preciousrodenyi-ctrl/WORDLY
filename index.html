<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    form {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .saved {
      background: #d4edda;
    }
  </style>
</head>
<body>

  <h1>📘 Wordly Dictionary</h1>

  <!-- Search Form -->
  <form id="searchForm">
    <input type="text" id="wordInput" placeholder="Enter a word..." required />
    <button type="submit">Search</button>
  </form>

  <!-- Result Section -->
  <div id="result" class="result"></div>

  <script>
    const form = document.getElementById("searchForm");
    const input = document.getElementById("wordInput");
    const resultDiv = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const word = input.value.trim();

      if (!word) {
        resultDiv.innerHTML = "<p class='error'>Please enter a word.</p>";
        return;
      }

      resultDiv.innerHTML = "Loading...";

      try {
        const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);

        if (!response.ok) {
          throw new Error("Word not found");
        }

        const data = await response.json();

        displayWord(data[0]);

      } catch (error) {
        resultDiv.innerHTML = `<p class="error">${error.message}</p>`;
      }
    });

    function displayWord(data) {
      const word = data.word;
      const phonetic = data.phonetic || "No pronunciation";
      const meanings = data.meanings;

      let definitionsHTML = "";

      meanings.forEach((meaning) => {
        definitionsHTML += `
          <p><strong>${meaning.partOfSpeech}</strong></p>
          <p>${meaning.definitions[0].definition}</p>
          <p><em>${meaning.definitions[0].example || ""}</em></p>
          <hr>
        `;
      });

      // Audio
      const audio = data.phonetics.find(p => p.audio);

      resultDiv.innerHTML = `
        <h2>${word}</h2>
        <p><strong>Pronunciation:</strong> ${phonetic}</p>

        ${audio ? `<audio controls src="${audio.audio}"></audio>` : "<p>No audio available</p>"}

        ${definitionsHTML}

        <button onclick="saveWord('${word}')">⭐ Save Word</button>
      `;
    }

    function saveWord(word) {
      let saved = JSON.parse(localStorage.getItem("savedWords")) || [];
      saved.push(word);
      localStorage.setItem("savedWords", JSON.stringify(saved));

      resultDiv.classList.add("saved");

      setTimeout(() => {
        resultDiv.classList.remove("saved");
      }, 1000);
    }
  </script>

</body>
</html>
